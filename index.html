<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROMPTLY</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h3 id="promptDisplay"> Loading connection prompt...</h3>
        <div id="timerContainer">
            Next prompt in: <span id="timer">02:00</span>
        </div>
        <form id="promptForm">
            <input type="text" id="userResponse" placeholder="Click map to set location, then type answer..." required>
            <button type="submit">Drop Pin 📍</button>
        </form>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. Initialize a flat world map with zooming/dragging completely disabled
        const map = L.map('map', {
            zoomControl: false,       
            boxZoom: false,           
            doubleClickZoom: false,   
            dragging: false,          
            keyboard: false,          
            scrollWheelZoom: false,   
            tap: false                
        }).setView([15, 0], 2);       

        // 2. Dark Outline Map Layer - Built natively with crisp lines and ZERO labels/text
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CartoDB',
            noWrap: true              
        }).addTo(map);

        let selectedCoordinates = null;
        let targetMarker = null;
        
        // This array holds active response pins so we can clear them later
        let activeResponsePins = [];

        // Custom PURPLE Dot Icon for the user's active click target
        const purpleDotIcon = L.divIcon({
            className: 'custom-target-marker',
            html: '<div style="background-color: #9b5de5; width: 14px; height: 14px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 12px rgba(155,93,229,0.8);"></div>',
            iconSize: [14, 14],
            iconAnchor: [7, 7]
        });

        // 3. Listening for clicks on the map to pick a location
        map.on('click', function(e) {
            selectedCoordinates = e.latlng;

            // Move or create the placeholder selection marker
            if (targetMarker) {
                targetMarker.setLatLng(selectedCoordinates);
            } else {
                targetMarker = L.marker(selectedCoordinates, { icon: purpleDotIcon }).addTo(map);
            }
        });

        // 4. Curated Hackathon Prompt Pool
        const connectionPrompts = [
            "What is one small thing bringing people together right now?",
            "What is a piece of advice a stranger gave you that you will never forget?",
            "What made you smile today while watching someone else?",
            "What is a memory you share with someone who lives miles away?",
            "If you could send a wave of encouragement to any country, where and why?",
            "What is a song that instantly makes you feel connected to others?",
            "What tradition or custom makes you feel closest to your family or community?",
            "Describe a time an unexpected act of kindness changed your entire day."
        ];

        let usedPrompts = [];

        function getNextPrompt() {
            // WIPE SCREEN LOGIC: Remove all dropped response pins from the map layer
            activeResponsePins.forEach(function(pin) {
                map.removeLayer(pin);
            });
            activeResponsePins = [];

            // Reset the pool if all prompts have been displayed
            if (connectionPrompts.length === 0) {
                connectionPrompts.push(...usedPrompts);
                usedPrompts = [];
            }
            
            // Extract a random prompt from the remaining choices
            const randomIndex = Math.floor(Math.random() * connectionPrompts.length);
            const chosenPrompt = connectionPrompts.splice(randomIndex, 1)[0];
            usedPrompts.push(chosenPrompt);
            
            document.getElementById('promptDisplay').innerText = ` ${chosenPrompt}`;
        }

        // 5. Handle Form Submission (Dropping the Pin)
        document.getElementById('promptForm').addEventListener('submit', function(e) {
            e.preventDefault();

            if (!selectedCoordinates) {
                alert("Please click anywhere on the world map first to select your pin drop spot!");
                return;
            }

            const textInput = document.getElementById('userResponse');
            const message = textInput.value;

            // Place permanent pin with custom handwritten font inside the popup box
            const newPin = L.marker([selectedCoordinates.lat, selectedCoordinates.lng])
                .addTo(map)
                .bindPopup(`<div style="font-family: 'Caveat', cursive; font-size: 20px; font-weight: bold; color: #0077b6; padding: 2px;">${message}</div>`)
                .openPopup();

            activeResponsePins.push(newPin);

            // Reset input fields and clear selection targets
            textInput.value = '';
            if (targetMarker) {
                map.removeLayer(targetMarker);
                targetMarker = null;
            }
            selectedCoordinates = null;
        });

        // 6. Countdown Timer Logic (2 Minutes = 120 seconds)
        let totalSeconds = 120;
        const timerElement = document.getElementById('timer');

        function updateCountdown() {
            let minutes = Math.floor(totalSeconds / 60);
            let seconds = totalSeconds % 60;

            let formattedMinutes = minutes < 10 ? '0' + minutes : minutes;
            let formattedSeconds = seconds < 10 ? '0' + seconds : seconds;

            timerElement.innerText = `${formattedMinutes}:${formattedSeconds}`;

            if (totalSeconds <= 0) {
                totalSeconds = 120;
                getNextPrompt();
            } else {
                totalSeconds--;
            }
        }

        // Initialize App State
        getNextPrompt();         
        updateCountdown();       
        setInterval(updateCountdown, 1000); 
    </script>
</body>
</html>

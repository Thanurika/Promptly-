<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Connection Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h3>💭 What is one thing connecting all of us today?</h3>
        <form id="promptForm">
            <input type="text" id="userResponse" placeholder="Answer anonymously..." required>
            <button type="submit">Drop Pin 📍</button>
        </form>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. Initialize a flat world map, centered globally, zoomed out
        const map = L.map('map').setView([20, 0], 2);

        // 2. Add the map graphics layer (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        let userLocation = null;

        // 3. Ask the browser for the user's location immediately
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userLocation = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                },
                (error) => {
                    console.error("Location access denied:", error);
                }
            );
        }

        // 4. Handle form submission (Dropping the pin)
        document.getElementById('promptForm').addEventListener('submit', function(e) {
            e.preventDefault();

            if (!userLocation) {
                alert("Please allow location access in your browser to drop a pin!");
                return;
            }

            const textInput = document.getElementById('userResponse');
            const message = textInput.value;

            // Create a pin marker on the map and bind the popup text
            L.marker([userLocation.lat, userLocation.lng])
                .addTo(map)
                .bindPopup(`<div style="font-size: 14px; font-weight: bold;">${message}</div>`)
                .openPopup();

            // Clear the input field for the next entry
            textInput.value = '';
        });
    </script>
</body>
</html>

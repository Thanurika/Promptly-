<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Connection Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h3>💭 What is one thing connecting all of us today?</h3>
        <form id="promptForm">
            <input type="text" id="userResponse" placeholder="Answer anonymously..." required>
            <button type="submit">Drop Pin 📍</button>
        </form>
    </header>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. Initialize a flat world map with ALL zooming, dragging, and panning completely disabled
        const map = L.map('map', {
            zoomControl: false,       // Removes the +/- buttons from the screen
            boxZoom: false,           // Disables zooming by dragging a box
            doubleClickZoom: false,   // Disables zooming when double-clicking
            dragging: false,          // Disables dragging the map around
            keyboard: false,          // Disables panning the map with arrow keys
            scrollWheelZoom: false,   // Disables zooming with the mouse wheel
            tap: false                // Disables double-tap zoom on mobile devices
        }).setView([15, 0], 2);       // Sets the center point adjusted to fit the whole world nicely

        // 2. Add the map graphics layer and force it to stay in bounds without looping/wrapping
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            noWrap: true              // Stops the world from repeating infinitely horizontally
        }).addTo(map);

        let userLocation = null;

        // 3. Ask the browser for the user's location immediately
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userLocation = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                },
                (error) => {
                    console.error("Location access denied:", error);
                }
            );
        }

        // 4. Handle form submission (Dropping the pin)
        document.getElementById('promptForm').addEventListener('submit', function(e) {
            e.preventDefault();

            if (!userLocation) {
                alert("Please allow location access in your browser to drop a pin!");
                return;
            }

            const textInput = document.getElementById('userResponse');
            const message = textInput.value;

            // Create a pin marker on the map and bind the popup text
            L.marker([userLocation.lat, userLocation.lng])
                .addTo(map)
                .bindPopup(`<div style="font-size: 14px; font-weight: bold; color: #1e1e24;">${message}</div>`)
                .openPopup();

            // Clear the input field for the next entry
            textInput.value = '';
        });
    </script>
</body>
</html>
